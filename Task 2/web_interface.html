<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Tic‑Tac‑Toe AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #eef2f5;
            color: #1a2a3a;
            line-height: 1.4;
            padding: 2rem 1.5rem;
        }

        .app-wrapper {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* header */
        .page-header {
            margin-bottom: 2rem;
            text-align: center;
        }
        .page-header h1 {
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            color: #1e4b6e;
        }
        .page-header p {
            color: #4a627a;
            margin-top: 0.3rem;
            font-size: 0.9rem;
        }

        /* 2‑column layout: board + log */
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 1.8rem;
        }

        /* left panel – game */
        .game-panel {
            background: white;
            border-radius: 28px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            padding: 1.8rem;
        }

        /* right panel – log only */
        .log-panel {
            background: white;
            border-radius: 28px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
        }

        /* difficulty card – button group */
        .difficulty-card {
            background: #f8fafc;
            border-radius: 20px;
            padding: 1.2rem;
            border: 1px solid #e2edf2;
            margin-bottom: 1.5rem;
        }
        .difficulty-header {
            font-weight: 500;
            margin-bottom: 0.8rem;
            font-size: 0.9rem;
            color: #1e4b6e;
            text-align: center;
        }
        .difficulty-buttons {
            display: flex;
            gap: 0.6rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .difficulty-btn {
            background: white;
            border: 1px solid #cbd5e1;
            padding: 0.5rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            color: #1e4b6e;
        }
        .difficulty-btn:hover {
            background: #e2e8f0;
            transform: translateY(-1px);
        }
        .difficulty-btn.active {
            background: #1e4b6e;
            border-color: #1e4b6e;
            color: white;
        }
        .difficulty-desc {
            font-size: 0.75rem;
            color: #5b7a9a;
            margin-top: 0.8rem;
            text-align: center;
        }

        /* board */
        .board {
            display: grid;
            grid-template-columns: repeat(3, minmax(90px, 110px));
            grid-auto-rows: minmax(90px, 110px);
            gap: 10px;
            justify-content: center;
            margin: 1.5rem 0;
        }
        .cell {
            background: #fefefe;
            border-radius: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s ease;
            border: 1px solid #e0ecf2;
            position: relative;
        }
        .cell:hover:not(.disabled) {
            transform: scale(0.98);
            background: #f4f9fe;
            border-color: #9bc0da;
        }
        .cell.disabled {
            cursor: default;
            opacity: 0.9;
        }
        .winning-cell {
            background: #e9f5eb;
            border: 2px solid #2c8c5a;
            color: #1f6e48;
        }
        .score-overlay {
            position: absolute;
            bottom: 6px;
            right: 8px;
            font-size: 0.7rem;
            font-family: monospace;
            font-weight: 600;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 2px 6px;
            border-radius: 20px;
        }

        /* game status */
        .game-status {
            text-align: center;
            background: #f0f4f8;
            padding: 0.8rem;
            border-radius: 40px;
            font-weight: 500;
            margin-top: 0.5rem;
        }
        .reset-btn {
            width: 100%;
            background: #1e4b6e;
            border: none;
            padding: 0.8rem;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 1rem;
        }
        .reset-btn:hover {
            background: #0f3a55;
        }
        .reset-btn.disabled {
            background: #9bb7d0;
            cursor: not-allowed;
        }

        /* thinking log */
        .thinking-log {
            background: #1e2a36;
            border-radius: 20px;
            padding: 1rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .thinking-log h3 {
            color: #cbdbe6;
            font-size: 0.9rem;
            margin-bottom: 0.8rem;
            letter-spacing: 0.02em;
        }
        .log-container {
            flex: 1;
            overflow-y: auto;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.7rem;
            max-height: 400px;
        }
        .log-entry {
            padding: 0.5rem 0;
            border-bottom: 1px solid #2e3e4a;
            color: #bdd4e8;
        }
        .log-entry strong {
            color: #f2c94c;
        }

        @media (max-width: 780px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
            .board {
                grid-template-columns: repeat(3, minmax(80px, 95px));
                grid-auto-rows: minmax(80px, 95px);
            }
        }
    </style>
</head>
<body>
<div class="app-wrapper">
    <div class="page-header">
        <h1>🎮 Tic‑Tac‑Toe AI</h1>
        <p>unbeatable AI | adjustable difficulty | live reasoning log</p>
    </div>

    <div class="dashboard">
        <!-- LEFT: GAME -->
        <div class="game-panel">
            <div class="difficulty-card">
                <div class="difficulty-header">
                    🧠 AI difficulty
                </div>
                <div class="difficulty-buttons" id="difficultyButtons">
                    <button data-diff="0" class="difficulty-btn">Easy</button>
                    <button data-diff="1" class="difficulty-btn">Medium</button>
                    <button data-diff="2" class="difficulty-btn">Hard</button>
                    <button data-diff="3" class="difficulty-btn">Unbeatable</button>
                </div>
                <div class="difficulty-desc" id="difficultyDesc">
                    Select a difficulty to start the game
                </div>
            </div>

            <div class="board" id="board"></div>

            <div class="game-status" id="gameStatus">
                ⚙️ Select a difficulty to begin
            </div>
            <button class="reset-btn" id="resetBtn" disabled>⟳ New game</button>
        </div>

        <!-- RIGHT: AI REASONING LOG ONLY -->
        <div class="log-panel">
            <div class="thinking-log">
                <h3>🧠 AI reasoning log</h3>
                <div class="log-container" id="thinkingLog">
                    <div class="log-entry">🤖 minimax engine ready</div>
                    <div class="log-entry">💡 select a difficulty to start</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Game state
    let board = Array(9).fill(null);
    let gameActive = false;          // game only active after difficulty chosen
    let currentPlayer = 'X';         // X = human, O = AI
    let aiDifficulty = null;         // no default difficulty
    let currentWinningLine = null;
    let difficultySelected = false;

    // DOM elements
    const boardEl = document.getElementById('board');
    const gameStatusEl = document.getElementById('gameStatus');
    const resetBtn = document.getElementById('resetBtn');
    const thinkingLogContainer = document.getElementById('thinkingLog');
    const difficultyButtons = document.querySelectorAll('.difficulty-btn');
    const difficultyDescSpan = document.getElementById('difficultyDesc');

    function addLogEntry(msg) {
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute:'2-digit', second:'2-digit' });
        entry.innerHTML = `<strong>[${time}]</strong> ${msg}`;
        thinkingLogContainer.appendChild(entry);
        entry.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        while (thinkingLogContainer.children.length > 40) {
            thinkingLogContainer.removeChild(thinkingLogContainer.children[1]);
        }
    }

    function getScoreColor(score) {
        if (score === null) return '';
        if (score >= 8) return 'rgba(40, 167, 69, 0.25)';
        if (score >= 5) return 'rgba(40, 167, 69, 0.15)';
        if (score >= 1) return 'rgba(40, 167, 69, 0.08)';
        if (score === 0) return 'rgba(0,0,0,0.02)';
        if (score <= -5) return 'rgba(220, 53, 69, 0.2)';
        if (score <= -1) return 'rgba(220, 53, 69, 0.1)';
        return 'rgba(255, 193, 7, 0.1)';
    }

    function renderBoard(scoresMap = null) {
        boardEl.innerHTML = '';
        for (let i = 0; i < 9; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            // Disable cell if game not active, or cell filled, or not human's turn
            if (!gameActive || board[i] !== null || currentPlayer !== 'X') {
                cell.classList.add('disabled');
            }
            cell.textContent = board[i] || '';
            cell.style.fontSize = board[i] ? '2.8rem' : '1.8rem';
            
            if (scoresMap && scoresMap[i] !== undefined && board[i] === null && gameActive) {
                const scoreVal = scoresMap[i];
                cell.style.background = getScoreColor(scoreVal);
                const overlay = document.createElement('div');
                overlay.className = 'score-overlay';
                overlay.textContent = scoreVal;
                cell.appendChild(overlay);
            } else if (board[i] === null) {
                cell.style.background = '#fefefe';
            }
            
            if (currentWinningLine && currentWinningLine.includes(i)) {
                cell.classList.add('winning-cell');
            }
            
            // Only attach click handler if game is active (otherwise no effect)
            cell.addEventListener('click', () => {
                if (gameActive && board[i] === null && currentPlayer === 'X') {
                    handleHumanMove(i);
                }
            });
            boardEl.appendChild(cell);
        }
    }

    function checkGameState() {
        const winPatterns = [
            [0,1,2], [3,4,5], [6,7,8],
            [0,3,6], [1,4,7], [2,5,8],
            [0,4,8], [2,4,6]
        ];
        for (let pattern of winPatterns) {
            const [a,b,c] = pattern;
            if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                currentWinningLine = pattern;
                const winner = board[a];
                if (winner === 'X') return { over: true, msg: '🎉 You won! Congratulations!' };
                else return { over: true, msg: '🤖 AI wins – better luck next time' };
            }
        }
        if (board.every(cell => cell !== null)) {
            currentWinningLine = null;
            return { over: true, msg: '📊 It\'s a draw!' };
        }
        currentWinningLine = null;
        return { over: false, msg: '' };
    }

    async function handleHumanMove(pos) {
        if (!gameActive || board[pos] !== null || currentPlayer !== 'X') return;
        board[pos] = 'X';
        renderBoard();
        
        const state = checkGameState();
        if (state.over) {
            gameActive = false;
            gameStatusEl.textContent = state.msg;
            addLogEntry(state.msg);
            renderBoard();
            return;
        }
        
        currentPlayer = 'O';
        gameStatusEl.textContent = '🤖 AI is thinking ...';
        renderBoard();
        setTimeout(() => aiMove(), 60);
    }

    async function aiMove() {
        if (!gameActive || currentPlayer !== 'O') return;
        addLogEntry(`AI thinking (${getDifficultyName(aiDifficulty)})`);
        try {
            const res = await fetch('/ai_move', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ board: board, difficulty: aiDifficulty })
            });
            const data = await res.json();
            
            if (data.move_scores) {
                const scoreMap = {};
                data.move_scores.forEach(ms => { scoreMap[ms.position] = ms.score; });
                renderBoard(scoreMap);
            }
            
            if (data.move !== undefined && board[data.move] === null) {
                board[data.move] = 'O';
                addLogEntry(`🤗 AI chose position ${data.move} (score ${data.score})`);
                if (data.score >= 8) addLogEntry(`✨ optimal move`);
            }
            renderBoard();
            
            const state = checkGameState();
            if (state.over) {
                gameActive = false;
                gameStatusEl.textContent = state.msg;
                addLogEntry(state.msg);
                renderBoard();
                return;
            }
            
            currentPlayer = 'X';
            gameStatusEl.textContent = '✨ Your turn (X)';
            if (data.move_scores) {
                const map = {};
                data.move_scores.forEach(s => { map[s.position] = s.score; });
                renderBoard(map);
            } else {
                renderBoard();
            }
        } catch (err) {
            addLogEntry(`⚠️ API error: ${err.message}`);
            gameStatusEl.textContent = '⚠️ Backend error – check if server is running';
        }
    }

    function getDifficultyName(level) {
        return ['Easy (random)', 'Medium (1‑ply)', 'Hard (full minimax)', 'Unbeatable (α‑β)'][level];
    }

    function resetGame() {
        board = Array(9).fill(null);
        gameActive = true;
        currentPlayer = 'X';
        currentWinningLine = null;
        gameStatusEl.textContent = '✨ Your turn (X)';
        renderBoard();
        addLogEntry('⟳ Game reset');
    }

    // Called when a difficulty button is clicked
    function selectDifficulty(level) {
        aiDifficulty = level;
        difficultySelected = true;
        gameActive = true;
        // Update button active state
        difficultyButtons.forEach(btn => {
            const diffVal = parseInt(btn.getAttribute('data-diff'));
            if (diffVal === level) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
        // Update description
        const descs = [
            'random moves – no intelligence',
            'looks 1 move ahead, misses traps',
            'full minimax – explores all possibilities',
            'minimax + alpha‑beta pruning – optimal & fast'
        ];
        difficultyDescSpan.textContent = descs[level];
        addLogEntry(`Difficulty set to ${getDifficultyName(level)}`);
        
        // Enable reset button
        resetBtn.disabled = false;
        // Start a fresh game
        resetGame();
    }

    // Attach click handlers to difficulty buttons
    difficultyButtons.forEach(btn => {
        btn.addEventListener('click', () => {
            const newDiff = parseInt(btn.getAttribute('data-diff'));
            selectDifficulty(newDiff);
        });
    });

    resetBtn.addEventListener('click', () => {
        if (difficultySelected && gameActive === true) {
            resetGame();
        } else if (difficultySelected) {
            // game already over, just reset
            resetGame();
        } else {
            addLogEntry('⚠️ Please select a difficulty first');
        }
    });

    // Initial render (board empty, disabled)
    function init() {
        renderBoard();
        addLogEntry('🎮 Game ready – select a difficulty to start');
        // No default difficulty, board inactive
        gameActive = false;
        resetBtn.disabled = true;
    }
    init();
</script>
</body>
</html>
