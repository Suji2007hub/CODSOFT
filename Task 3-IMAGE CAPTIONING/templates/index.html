<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Captioning · Vision Transformer + Transformer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8fafc;
            color: #0f172a;
            padding: 2rem 1.5rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* header */
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .header h1 {
            font-size: 1.8rem;
            font-weight: 600;
            color: #0f3b5c;
        }
        .header p {
            color: #475569;
            margin-top: 0.25rem;
            font-size: 0.9rem;
        }

        /* upload card */
        .upload-card {
            background: white;
            border-radius: 24px;
            padding: 2rem;
            text-align: center;
            margin-bottom: 2rem;
            border: 1px solid #e2e8f0;
            cursor: pointer;
            transition: all 0.2s;
        }
        .upload-card:hover {
            border-color: #94a3b8;
            background: #fefefe;
        }
        .upload-card.drag-over {
            background: #f1f5f9;
            border: 2px dashed #3b82f6;
        }
        .upload-icon {
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
        }
        .upload-btn {
            background: #1e4b6e;
            color: white;
            border: none;
            padding: 0.5rem 1.5rem;
            border-radius: 40px;
            font-size: 0.85rem;
            margin-top: 1rem;
            cursor: pointer;
        }
        .upload-btn:hover {
            background: #0f3a55;
        }

        /* loading */
        .loading {
            display: none;
            background: white;
            border-radius: 24px;
            padding: 2rem;
            text-align: center;
            margin-bottom: 2rem;
            border: 1px solid #e2e8f0;
        }
        .spinner {
            border: 3px solid #e2e8f0;
            border-top: 3px solid #1e4b6e;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.6s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* preview */
        .preview {
            background: white;
            border-radius: 24px;
            padding: 1rem;
            margin-bottom: 2rem;
            display: none;
            text-align: center;
            border: 1px solid #e2e8f0;
        }
        .preview img {
            max-width: 100%;
            max-height: 280px;
            border-radius: 16px;
            object-fit: contain;
        }

        /* results grid – clean two‑column for captions */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .caption-card {
            background: white;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            overflow: hidden;
            transition: 0.1s;
        }
        .card-header {
            background: #f8fafc;
            padding: 0.75rem 1rem;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .mode-title {
            font-weight: 600;
            font-size: 0.9rem;
            color: #0f3b5c;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .confidence {
            background: #dcfce7;
            color: #15803d;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
        }
        .caption-text {
            padding: 1rem;
            font-size: 0.85rem;
            line-height: 1.5;
            color: #1e293b;
            background: white;
            border-bottom: 1px solid #f1f5f9;
        }
        .keywords {
            padding: 0.6rem 1rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            background: #fafcff;
        }
        .keyword {
            background: #eef2ff;
            color: #1e40af;
            font-size: 0.7rem;
            padding: 0.2rem 0.7rem;
            border-radius: 20px;
        }
        .copy-btn {
            background: none;
            border: none;
            font-size: 0.8rem;
            cursor: pointer;
            color: #64748b;
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
            transition: 0.1s;
        }
        .copy-btn:hover {
            background: #e2e8f0;
            color: #0f172a;
        }

        /* history */
        .history-section {
            background: white;
            border-radius: 24px;
            padding: 1.2rem;
            border: 1px solid #e2e8f0;
        }
        .history-section h3 {
            font-size: 1rem;
            margin-bottom: 1rem;
            color: #1e4b6e;
        }
        .history-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 1rem;
        }
        .history-item {
            cursor: pointer;
            text-align: center;
        }
        .history-item img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }
        .history-date {
            font-size: 0.65rem;
            color: #64748b;
            margin-top: 0.25rem;
        }

        @media (max-width: 700px) {
            .results-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📷 Image Captioning · Vision Transformer + Transformer</h1>
        <p>Pre‑trained vision encoder (ViT) + transformer decoder | 6 writing styles</p>
    </div>

    <div class="upload-card" id="uploadCard">
        <div class="upload-icon">🖼️</div>
        <h3>Drop an image or click to upload</h3>
        <p style="font-size:0.8rem; margin-top:0.25rem;">JPG, PNG, GIF (max 16MB)</p>
        <button class="upload-btn" id="uploadBtn">Choose file</button>
        <input type="file" id="fileInput" accept="image/*" style="display: none;">
    </div>

    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>Vision Transformer extracting features...</p>
        <p style="font-size:0.8rem; margin-top:0.3rem;">Transformer decoder generating caption</p>
    </div>

    <div class="preview" id="preview">
        <img id="previewImg" alt="preview">
    </div>

    <div id="results" class="results-grid"></div>

    <div class="history-section" id="historySection" style="display: none;">
        <h3>📸 Recent images</h3>
        <div id="historyGrid" class="history-grid"></div>
    </div>
</div>

<script>
    const uploadCard = document.getElementById('uploadCard');
    const fileInput = document.getElementById('fileInput');
    const uploadBtn = document.getElementById('uploadBtn');
    const loadingDiv = document.getElementById('loading');
    const previewDiv = document.getElementById('preview');
    const previewImg = document.getElementById('previewImg');
    const resultsDiv = document.getElementById('results');
    const historySection = document.getElementById('historySection');
    const historyGrid = document.getElementById('historyGrid');

    uploadCard.addEventListener('dragover', (e) => {
        e.preventDefault();
        uploadCard.classList.add('drag-over');
    });
    uploadCard.addEventListener('dragleave', () => {
        uploadCard.classList.remove('drag-over');
    });
    uploadCard.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadCard.classList.remove('drag-over');
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith('image/')) handleUpload(file);
    });
    uploadBtn.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => {
        if (e.target.files[0]) handleUpload(e.target.files[0]);
    });

    async function handleUpload(file) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            previewImg.src = ev.target.result;
            previewDiv.style.display = 'block';
        };
        reader.readAsDataURL(file);

        uploadCard.style.display = 'none';
        loadingDiv.style.display = 'block';
        resultsDiv.innerHTML = '';

        const formData = new FormData();
        formData.append('image', file);

        try {
            const res = await fetch('/upload', { method: 'POST', body: formData });
            const data = await res.json();
            if (data.error) throw new Error(data.error);
            displayResults(data);
            await loadHistory();
        } catch (err) {
            alert('Error: ' + err.message);
        } finally {
            loadingDiv.style.display = 'none';
            uploadCard.style.display = 'block';
        }
    }

    function displayResults(data) {
        resultsDiv.innerHTML = '';
        const modes = data.modes;
        for (const [key, mode] of Object.entries(modes)) {
            const card = document.createElement('div');
            card.className = 'caption-card';
            card.innerHTML = `
                <div class="card-header">
                    <div class="mode-title">
                        <span>${mode.icon}</span>
                        <span>${mode.description}</span>
                    </div>
                    <div class="confidence">${Math.round(mode.confidence * 100)}%</div>
                </div>
                <div class="caption-text" id="caption-${key}">${mode.text}</div>
                <div class="keywords">
                    ${mode.keywords.map(kw => `<span class="keyword">#${kw}</span>`).join('')}
                    <button class="copy-btn" onclick="copyToClipboard('${mode.text.replace(/'/g, "\\'")}')">📋 copy</button>
                </div>
            `;
            resultsDiv.appendChild(card);
        }
    }

    window.copyToClipboard = (text) => {
        navigator.clipboard.writeText(text);
        alert('Caption copied to clipboard');
    };

    async function loadHistory() {
        const res = await fetch('/history');
        const data = await res.json();
        if (data.history && data.history.length > 0) {
            historyGrid.innerHTML = data.history.map(item => `
                <div class="history-item" onclick="loadHistoryItem(${item.id})">
                    <img src="${item.image_url}" alt="history">
                    <div class="history-date">${item.timestamp}</div>
                </div>
            `).join('');
            historySection.style.display = 'block';
        }
    }

    window.loadHistoryItem = async (id) => {
        const res = await fetch(`/reload/${id}`);
        const data = await res.json();
        if (data.error) return;
        previewImg.src = data.image_url;
        previewDiv.style.display = 'block';
        displayResults(data);
        window.scrollTo({ top: previewDiv.offsetTop - 20, behavior: 'smooth' });
    };

    loadHistory();
</script>
</body>
</html>
